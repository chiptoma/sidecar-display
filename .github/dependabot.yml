---
# =============================================================================
# DEPENDABOT
# Weekly update PRs for npm and GitHub Actions.
# -----------------------------------------------------------------------------
# NOTE: The Raycast Store requires a current `@raycast/api`, so keeping it fresh
#   is a submission requirement, not just hygiene. Swift dependencies are not
#   supported by Dependabot — bump `swift/Package.swift` by hand and commit the
#   regenerated `swift/Package.resolved`.
# =============================================================================

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    ignore:
      # The Raycast toolchain pins this: @raycast/eslint-config peer-requires
      # `typescript@>=4.8.4 <6.1.0`, so a major bump cannot install (ERESOLVE).
      # Revisit only when Raycast widens that peer range.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      # The type definitions must match the runtime, which .nvmrc and CI pin to
      # Node 22 — newer types would describe APIs that are not actually there.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
