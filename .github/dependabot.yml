---
# =============================================================================
# DEPENDABOT
# Weekly update PRs for npm and GitHub Actions.
# -----------------------------------------------------------------------------
# NOTE: The Raycast Store requires a current `@raycast/api`, so keeping it fresh
#   is a submission requirement, not just hygiene. Swift dependencies are not
#   supported by Dependabot — bump `swift/Package.swift` by hand and commit the
#   regenerated `swift/Package.resolved`.
# =============================================================================

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    ignore:
      # The Raycast toolchain caps this: @raycast/eslint-config peer-requires
      # `typescript@>=4.8.4 <6.1.0`, so 6.1+ and every 7.x cannot install
      # (ERESOLVE). 6.0.x is fine and must keep flowing through — hence a
      # version bound rather than a blanket major-version ignore. Drop this
      # entirely once Raycast widens that peer range.
      - dependency-name: typescript
        versions:
          - ">=6.1.0"
      # The type definitions must match the runtime, which .nvmrc and CI pin to
      # Node 22 — newer types would describe APIs that are not actually there.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
