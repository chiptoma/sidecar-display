---
# =============================================================================
# CI
# Lint, type-check/build, and run the hardware-free unit tests on every push.
# -----------------------------------------------------------------------------
# NOTE: The safety and hardware suites need BetterDisplay (and an iPad) and
#   cannot run on hosted runners, so CI covers lint, build, and the pure logic
#   only. Run `npm run test:hardware` locally before release.
# NOTE: `build` compiles the Swift package via extensions-swift-tools, so this
#   runs on macOS with the runner's default Xcode.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only keep the latest run per ref; cancel superseded ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('swift/Package.swift') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and type-check
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
